<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IPL 2026 LIVE</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#000;
color:#fff;
font-family:'Poppins',sans-serif;
text-align:center;
}

/* TITLE */

.title{
font-size:38px;
font-weight:700;
text-shadow:0 0 12px #fff;
margin-top:15px;
}

.subtitle{
color:#ffd700;
font-size:14px;
}

/* PLAYER */

.player-box{
width:95%;
margin:15px auto;
border:2px solid #00bfff;
border-radius:14px;
overflow:hidden;
box-shadow:0 0 20px #00bfff;
}

.player{
position:relative;
padding-top:56.25%;
}

.player iframe{
position:absolute;
width:100%;
height:100%;
border:none;
}

/* LANGUAGE */

.lang{
display:flex;
justify-content:center;
gap:10px;
margin-top:10px;
}

.lang button{
padding:10px 22px;
border:none;
border-radius:8px;
background:#fff;
color:#000;
font-weight:700;
cursor:pointer;
}

/* TELEGRAM */

.telegram{
display:inline-block;
margin:15px;
padding:14px 32px;
background:#00bfff;
color:#000;
font-weight:700;
border-radius:10px;
text-decoration:none;
box-shadow:0 0 20px #00bfff;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.05);}
100%{transform:scale(1);}
}

/* SECTION TITLE */

.section{
font-size:20px;
margin-top:10px;
}

/* SCROLL BOX */

.scroll-box{
display:flex;
overflow-x:auto;
gap:12px;
padding:10px;
}

/* ESPN CARDS */

.espn-card{
min-width:320px;
height:200px;
border-radius:12px;
overflow:hidden;
border:1px solid #00bfff;
}

.espn-card iframe{
width:100%;
height:600px;
border:none;
margin-top:-200px;
}

/* POINTS */

.points{
width:95%;
margin:20px auto;
height:420px;
border-radius:12px;
overflow:hidden;
border:2px solid #00bfff;
box-shadow:0 0 15px #00bfff;
}

.points iframe{
width:100%;
height:900px;
border:none;
margin-top:-250px;
}

</style>

</head>

<body>

<div class="title">IPL 2026</div>
<div class="subtitle">Join @Cricfylive for Latest Updates</div>

<!-- PLAYER -->

<div class="player-box">
<div class="player">
<iframe id="liveFrame" allowfullscreen></iframe>
</div>
</div>

<!-- LANGUAGE -->

<div class="lang">
<button onclick="playVideo(hindi)">Hindi</button>
<button onclick="playVideo(english)">English</button>
</div>

<!-- TELEGRAM -->

<a class="telegram" href="https://t.me/CRICFyLive">JOIN TELEGRAM</a>

<!-- SCHEDULE -->

<div class="section">Match Schedule</div>

<div class="scroll-box">

<div class="espn-card">
<iframe src="https://www.espncricinfo.com/series/ipl-2026-1449924/match-schedule-fixtures-and-results"></iframe>
</div>

<div class="espn-card">
<iframe src="https://www.espncricinfo.com/series/ipl-2026-1449924/match-schedule-fixtures-and-results"></iframe>
</div>

</div>

<!-- POINTS -->

<div class="section">Points Table</div>

<div class="points">
<iframe src="https://www.espncricinfo.com/series/ipl-2026-1449924/points-table-standings"></iframe>
</div>

<script>

/* 🔥 SIRF YEH CHANGE KAR */

let hindi = "https://extrrav.pages.dev/c3?id=H1";
let english = "https://extrrav.pages.dev/c3?id=E1";

/* AUTO EMBED */

function convert(url){
return url.replace("live/","embed/").split("?")[0];
}

function playVideo(link){
document.getElementById("liveFrame").src = convert(link);
}

/* DEFAULT */

playVideo(hindi);

</script>

</body>
</html>
