<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IPL 2026 LIVE</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#000;
color:#fff;
font-family:'Poppins',sans-serif;
text-align:center;
}

.title{
font-size:38px;
font-weight:700;
text-shadow:0 0 12px #fff;
margin-top:15px;
}

.subtitle{
color:#ffd700;
font-size:14px;
margin-bottom:10px;
}

.player-box{
width:95%;
margin:10px auto;
border:2px solid #00bfff;
border-radius:14px;
overflow:hidden;
box-shadow:0 0 20px #00bfff;
}

.player{
position:relative;
padding-top:56.25%;
}

.player iframe{
position:absolute;
width:100%;
height:100%;
border:none;
}

.lang{
display:flex;
justify-content:center;
gap:10px;
margin-top:10px;
}

.lang button{
padding:10px 22px;
border:none;
border-radius:8px;
background:#fff;
color:#000;
font-weight:700;
cursor:pointer;
}

.telegram{
display:inline-block;
margin:20px;
padding:15px 35px;
background:#00bfff;
color:#000;
font-weight:700;
border-radius:10px;
text-decoration:none;
box-shadow:0 0 20px #00bfff;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.08);}
100%{transform:scale(1);}
}

#popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
display:flex;
justify-content:center;
align-items:center;
z-index:999;
}

.popup-box{
background:#111;
padding:25px;
border-radius:12px;
text-align:center;
border:2px solid #00bfff;
box-shadow:0 0 20px #00bfff;
}

.popup-box a{
display:block;
margin:10px 0;
padding:12px;
background:#00bfff;
color:#000;
font-weight:700;
border-radius:8px;
text-decoration:none;
}

.popup-box button{
padding:10px 20px;
border:none;
background:#fff;
color:#000;
border-radius:8px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="title">IPL 2026</div>
<div class="subtitle">Join @Cricfylive for Latest Updates</div>

<div class="player-box">
<div class="player">
<iframe id="liveFrame" allowfullscreen></iframe>
</div>
</div>

<div class="lang">
<button onclick="playVideo('hindi')">Hindi</button>
<button onclick="playVideo('english')">English</button>
</div>

<a class="telegram" href="https://t.me/CRICFyLive">JOIN TELEGRAM</a>

<div id="popup">
  <div class="popup-box">
    <h2>Join Telegram</h2>
    <a href="https://t.me/CRICFyLive" target="_blank">JOIN NOW</a>
    <button onclick="closePopup()">Close</button>
  </div>
</div>

<script>

let hindiLink = "https://cmvlive.blogspot.com/2025/09/fox.html?m=1";
let englishLink = "https://cmvlive.blogspot.com/2025/09/cmv.html";

function playVideo(type){
if(type === "hindi"){
document.getElementById("liveFrame").src = hindiLink;
}else{
document.getElementById("liveFrame").src = englishLink;
}
}

playVideo("hindi");

function closePopup(){
document.getElementById("popup").style.display="none";
}

</script>

</body>
</html>
